<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>极简点名器 | 简约大气 · 专注点名</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f1f5f9;  /* 柔和灰底，干净通透 */
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* 主容器：轻盈卡片 */
        .card {
            max-width: 860px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            overflow: hidden;
        }

        /* 顶部留白+简约装饰 */
        .card-header {
            padding: 2rem 2rem 0.5rem 2rem;
            border-bottom: 1px solid #eef2f6;
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            background: #eef2ff;
            color: #1e40af;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0f172a;
            letter-spacing: -0.3px;
            margin-bottom: 0.25rem;
        }

        .sub {
            color: #5b6e8c;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        /* 姓名展示区 —— 大气核心 */
        .display-area {
            background: #fafcff;
            margin: 2rem 2rem 1.5rem 2rem;
            border-radius: 2rem;
            padding: 3rem 1.5rem;
            text-align: center;
            border: 1px solid #eef2f8;
            box-shadow: inset 0 1px 2px #ffffff80, 0 6px 12px -8px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        #studentName {
            font-size: 3.8rem;
            font-weight: 600;
            color: #0a2540;
            letter-spacing: -0.5px;
            word-break: break-word;
            line-height: 1.2;
            transition: 0.08s linear;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border-radius: 1.5rem;
        }

        /* 按钮组：干净利落 */
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin: 0 2rem 2rem 2rem;
            flex-wrap: wrap;
        }

        .btn {
            font-size: 1.1rem;
            font-weight: 500;
            padding: 0.85rem 2rem;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            background: #ffffff;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 1px rgba(0,0,0,0.02);
            min-width: 140px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #0f172a;
            border: none;
            color: white;
            box-shadow: 0 4px 10px rgba(15,23,42,0.12);
        }

        .btn-primary:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(15,23,42,0.2);
        }

        .btn-secondary {
            background: white;
            border: 1px solid #e2e8f0;
            color: #334155;
        }

        .btn-secondary:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
            background: #f1f5f9;
            color: #94a3b8;
            border-color: #e2e8f0;
        }

        /* 状态栏 — 极简信息 */
        .info-panel {
            background: #f8fafc;
            margin: 0 2rem 2rem 2rem;
            padding: 1rem 1.5rem;
            border-radius: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.85rem;
            border: 1px solid #edf2f7;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .file-badge {
            background: #eef2ff;
            color: #1e40af;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .student-count {
            background: #e6f7ec;
            color: #2c6e4f;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 500;
        }

        .hint-text {
            color: #5b6e8c;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .step-guide {
            margin: 0 2rem 2rem 2rem;
            padding: 1rem 1.2rem;
            background: #fefce8;
            border-radius: 1.2rem;
            font-size: 0.75rem;
            color: #7b6e3b;
            border-left: 4px solid #eab308;
            line-height: 1.5;
        }

        footer {
            text-align: center;
            padding: 1.2rem 2rem 1.8rem;
            font-size: 0.7rem;
            color: #94a3b8;
            border-top: 1px solid #ecf3f9;
            background: #ffffff;
        }

        @media (max-width: 600px) {
            body { padding: 1rem; }
            .display-area { margin: 1.5rem; padding: 1.8rem 1rem; }
            #studentName { font-size: 2.2rem; min-height: 100px; }
            .btn { padding: 0.6rem 1.2rem; min-width: 110px; font-size: 1rem; }
            .action-bar { gap: 0.8rem; margin: 0 1.5rem 1.5rem 1.5rem; }
            .info-panel { margin: 0 1.5rem 1.5rem 1.5rem; flex-direction: column; align-items: flex-start; }
            .card-header { padding: 1.5rem 1.5rem 0.25rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div class="badge">✦ 极简点名器</div>
        <h1>随机学号 · 专注课堂</h1>
        <div class="sub">载入名单，一键开始，简约高效</div>
    </div>

    <!-- 姓名展示核心区 -->
    <div class="display-area">
        <div id="studentName">✨ 待加载</div>
    </div>

    <!-- 主要操作区 -->
    <div class="action-bar">
        <button class="btn btn-primary" id="loadFileBtn">📂 加载名单 (CSV)</button>
        <button class="btn btn-primary" id="startBtn" disabled>▶ 开始滚动</button>
        <button class="btn btn-secondary" id="pauseBtn" disabled>⏹️ 停止点名</button>
    </div>

    <!-- 简洁状态栏 -->
    <div class="info-panel">
        <div class="file-info">
            <span class="hint-text">📁 当前文件</span>
            <span class="file-badge" id="fileNameDisplay">未加载</span>
        </div>
        <div class="student-count" id="studentCountDisplay">👥 0 人</div>
        <div class="hint-text" id="statusMsg">⚡ 就绪</div>
    </div>

    <!-- 友好指引 (简约但清晰) -->
    <div class="step-guide">
        💡 <strong>首次使用 · 一步转换</strong> &nbsp; 用Excel打开名单 → 另存为「CSV (逗号分隔)」→ 回到此处点击「加载名单」即可。
    </div>

    <footer>
        ⚡ 纯本地运行 | 姓名放第一列 | 离线可用 · 大气简约
    </footer>
</div>

<script>
    // ---------- DOM 元素 ----------
    const studentNameDiv = document.getElementById('studentName');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const loadFileBtn = document.getElementById('loadFileBtn');
    const fileNameDisplaySpan = document.getElementById('fileNameDisplay');
    const studentCountSpan = document.getElementById('studentCountDisplay');
    const statusMsgSpan = document.getElementById('statusMsg');

    // ---------- 核心数据 ----------
    let studentsList = [];          // 存储学生姓名数组
    let rollingInterval = null;     // setInterval 句柄
    let isRolling = false;          // 滚动状态

    // ---------- 辅助函数：优雅提示 ----------
    function setStatusMessage(msg, isError = false) {
        statusMsgSpan.innerHTML = msg;
        statusMsgSpan.style.color = isError ? '#c2410c' : '#3b7c5e';
        if (!isError) {
            setTimeout(() => {
                if (statusMsgSpan.innerHTML === msg) {
                    statusMsgSpan.innerHTML = '⚡ 就绪';
                    statusMsgSpan.style.color = '#5b6e8c';
                }
            }, 3000);
        } else {
            setTimeout(() => {
                if (statusMsgSpan.innerHTML === msg) {
                    statusMsgSpan.innerHTML = '⚡ 就绪';
                    statusMsgSpan.style.color = '#5b6e8c';
                }
            }, 4000);
        }
    }

    // 停止滚动
    function stopRollingAndClear() {
        if (rollingInterval) {
            clearInterval(rollingInterval);
            rollingInterval = null;
        }
        isRolling = false;
    }

    // 随机选取一名学生并显示 (仅显示)
    function pickRandomStudentAndDisplay() {
        if (!studentsList.length) {
            studentNameDiv.innerText = '📭 无数据';
            return null;
        }
        const randomIndex = Math.floor(Math.random() * studentsList.length);
        const chosen = studentsList[randomIndex];
        studentNameDiv.innerText = chosen;
        return chosen;
    }

    // 开始随机高速滚动
    function startRolling() {
        if (!studentsList.length) {
            setStatusMessage('❌ 请先加载学生名单 (CSV)', true);
            return false;
        }
        // 若已经在滚动，先停止再重启（符合再次点击开始重新滚动）
        if (isRolling) {
            stopRollingAndClear();
        }
        isRolling = true;
        // 立刻滚动一次，避免卡顿感
        pickRandomStudentAndDisplay();
        // 高频刷新，制造随机抽选感 (约 30fps)
        rollingInterval = setInterval(() => {
            if (studentsList.length > 0) {
                const idx = Math.floor(Math.random() * studentsList.length);
                studentNameDiv.innerText = studentsList[idx];
            } else {
                // 防止意外清空
                stopRollingAndClear();
                studentNameDiv.innerText = '⚠️ 名单缺失';
            }
        }, 45);
        return true;
    }

    // 停止滚动，定格最终结果
    function stopAndPickFinal() {
        if (!studentsList.length) {
            studentNameDiv.innerText = '📭 无学生';
            setStatusMessage('尚未加载学生名单', true);
            return;
        }
        if (rollingInterval) {
            clearInterval(rollingInterval);
            rollingInterval = null;
        }
        isRolling = false;
        const finalStudent = pickRandomStudentAndDisplay();
        setStatusMessage(`🎉 点名结果：${finalStudent}`, false);
    }

    // ---------- CSV 解析核心 (稳定读取第一列) ----------
    function parseCsvFirstColumn(content, fileName) {
        const lines = content.split(/\r?\n/);
        const names = [];
        // 常见的表头词汇（自动跳过）
        const skipHeaders = ['姓名', '名字', '学生', '名称', 'name', 'Name', '学生姓名', '学员', '姓名列表'];
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line === '') continue;
            
            // 提取第一列 (逗号分隔)
            let firstCol = line;
            const commaPos = line.indexOf(',');
            if (commaPos !== -1) {
                firstCol = line.substring(0, commaPos);
            }
            // 移除可能包裹的引号 (Excel导出CSV常带引号)
            firstCol = firstCol.replace(/^["']|["']$/g, '').trim();
            if (firstCol === '') continue;
            
            // 如果是第一行且内容命中表头关键词，则跳过该行
            if (i === 0 && skipHeaders.includes(firstCol)) {
                continue;
            }
            names.push(firstCol);
        }
        return names;
    }

    // ---------- 加载文件 (仅支持 CSV) ----------
    function loadCSVFile(file) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (ext !== 'csv') {
            setStatusMessage('请选择 .csv 格式文件（Excel 另存为 CSV 即可）', true);
            return;
        }
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const content = e.target.result;
            const nameArray = parseCsvFirstColumn(content, file.name);
            if (!nameArray || nameArray.length === 0) {
                setStatusMessage(`❌ 文件“${file.name}”第一列未读取到学生姓名，请检查格式`, true);
                studentsList = [];
                studentCountSpan.innerText = '👥 0 人';
                fileNameDisplaySpan.innerText = '未加载';
                studentNameDiv.innerText = '⚠️ 无数据';
                startBtn.disabled = true;
                pauseBtn.disabled = true;
                return;
            }
            
            // 加载成功，更新全局数据
            studentsList = nameArray;
            studentCountSpan.innerText = `👥 ${studentsList.length} 人`;
            // 显示文件短名称
            const shortName = file.name.length > 28 ? file.name.substring(0, 24) + '...' : file.name;
            fileNameDisplaySpan.innerText = shortName;
            studentNameDiv.innerText = studentsList[0];
            startBtn.disabled = false;
            pauseBtn.disabled = false;
            setStatusMessage(`✅ 成功加载 ${studentsList.length} 位学生，点击开始点名`, false);
        };
        
        reader.onerror = () => {
            setStatusMessage('文件读取失败，请重试', true);
        };
        reader.readAsText(file, 'UTF-8');
    }

    // ---------- 文件选择交互 ----------
    function setupFileLoader() {
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = '.csv';
        fileInput.style.display = 'none';
        document.body.appendChild(fileInput);
        
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            // 如果正在滚动，先停止点名滚动
            if (isRolling) {
                stopRollingAndClear();
                studentNameDiv.innerText = studentsList.length ? studentsList[0] : '✨ 待加载';
            }
            loadCSVFile(file);
            fileInput.value = ''; // 清空，允许重复加载相同文件
        });
        
        loadFileBtn.addEventListener('click', () => {
            if (isRolling) {
                stopRollingAndClear();
            }
            fileInput.click();
        });
    }
    
    // ---------- 按钮事件绑定 ----------
    function bindEvents() {
        startBtn.addEventListener('click', () => {
            if (!studentsList.length) {
                setStatusMessage('请先通过「加载名单」选择CSV文件', true);
                return;
            }
            startRolling();
        });
        
        pauseBtn.addEventListener('click', () => {
            if (!studentsList.length) {
                setStatusMessage('暂无学生数据，请先加载名单', true);
                return;
            }
            stopAndPickFinal();
        });
    }
    
    // ---------- 初始化 ----------
    function init() {
        setupFileLoader();
        bindEvents();
        setStatusMessage('✨ 简约点名器已启动，请加载 CSV 文件', false);
    }
    
    init();
</script>
</body>
</html>
